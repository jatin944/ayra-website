# Netlify build & deploy configuration
# Project: ayracarbon.com

[build]
  publish = "."

# ==============================
# Custom domain & redirects
# ==============================

# Force www -> apex (so the canonical URL is ayracarbon.com, not www.ayracarbon.com)
# If you prefer www, flip the source/destination
[[redirects]]
  from = "https://www.ayracarbon.com/*"
  to = "https://ayracarbon.com/:splat"
  status = 301
  force = true

# Force HTTPS (Netlify does this automatically once SSL is provisioned, but explicit is better)
[[redirects]]
  from = "http://ayracarbon.com/*"
  to = "https://ayracarbon.com/:splat"
  status = 301
  force = true

# ==============================
# Security headers
# ==============================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # HSTS - tells browsers to always use HTTPS for one year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content Security Policy - allows Google Fonts only
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self'"

# ==============================
# Caching
# ==============================
[[headers]]
  for = "/*.html"
  [headers.values]
    # HTML can change - cache briefly
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
